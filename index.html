<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Sync + Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="identity-screen">
  <div class="identity-box">
    <h2>Who’s here tonight? 🌙</h2>
    <div class="identity-buttons">
      <button class="identity-btn aadi" data-user="aadi">🌿 Aadi</button>
      <button class="identity-btn varna" data-user="varna">🌸 Varna</button>
    </div>
  </div>
</div>
<h2>Watch YouTube Together</h2>
<p id="userLabel" class="user-label"></p>

<div id="video-container">
  <input type="search" id="youtubeUrl" placeholder="Paste YouTube URL here" autocomplete="off" />
  <div id="player"></div>
</div>

<div id="chat-container">
  <h4>Chat</h4>
  <div id="messages"></div>
  <input type="text" id="chatInput" placeholder="Type a message..." />
  <div id="typingIndicator" class="hidden">
    <span></span><span></span><span></span>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="main.js"></script>
</body>
</html>
