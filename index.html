<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Sync + Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="identity-screen">
  <div class="identity-box">
    <h2>Who’s here tonight? 🌙</h2>
    <div class="identity-buttons">
      <button class="identity-btn aadi" data-user="aadi">🌿 Aadi</button>
      <button class="identity-btn varna" data-user="varna">🌸 Varna</button>
    </div>
  </div>
</div>
<h2>Here, With You ❤️</h2>
<p id="userLabel" class="user-label"></p>

<div id="video-container">
  <div class="input-group">
  <input type="search" id="youtubeUrl" placeholder="Paste YouTube URL here" />
  <button id="saveBtn">💾</button>
</div>
  <div id="player"></div>
</div>

<div id="tabs">
  <button class="tab active" data-tab="chat">💬 Chat</button>
  <button class="tab" data-tab="watchlist">📺 Playlist</button>
</div>
<div id="chat-container" class="tab-content active">
  <h4>Chat</h4>
  <div id="messages"></div>
  <input type="text" id="chatInput" placeholder="Type a message..." />
  <div id="typingIndicator" class="hidden">
    <span></span><span></span><span></span>
  </div>
</div>
<div id="watchlist-container" class="tab-content">
  <h4>📺 Watch Later</h4>
  <div id="watchlist"></div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="main.js"></script>
</body>
</html>
